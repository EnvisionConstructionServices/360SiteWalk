<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Site Walk - Field App</title>
    
    <!-- External Libraries -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; overflow: hidden; }
        #app-container { display: flex; flex-direction: column; height: 100vh; }
        
        /* Map Section (Top) */
        #map { flex: 1; background: #f0f0f0; border-bottom: 3px solid #333; position: relative; }
        
        /* Viewer Section (Bottom) */
        #viewer-container { flex: 1; background: #000; position: relative; }
        #panorama { width: 100%; height: 100%; }

        /* UI Overlays */
        .controls { position: absolute; top: 10px; right: 10px; z-index: 1000; display: flex; gap: 5px; }
        .btn { background: white; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; border: 2px solid #333; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn:active { background: #eee; transform: translateY(2px); }
        .status-pill { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.7); color: white; padding: 5px 12px; border-radius: 20px; font-size: 12px; z-index: 1000; }
    </style>
</head>
<body>

<div id="app-container">
    <!-- TOP: Floor Plan -->
    <div id="map">
        <div class="controls">
            <div class="btn" onclick="toggleMode()">MODE: CAPTURE</div>
        </div>
        <div id="status" class="status-pill">System Ready</div>
    </div>

    <!-- BOTTOM: 360 Viewer -->
    <div id="viewer-container">
        <div id="panorama"></div>
    </div>
</div>

<script>
    // 1. GET PROJECT CONFIG FROM URL (e.g. ?api=ID&plan=URL)
    const urlParams = new URLSearchParams(window.location.search);
    const SCRIPT_URL = urlParams.get('api'); 
    const PLAN_IMAGE = urlParams.get('plan') || 'https://via.placeholder.com/1000x800?text=Upload+Floorplan+to+Drive';

    let isCaptureMode = true;

    // 2. INITIALIZE LEAFLET (Floor Plan)
    var map = L.map('map', { crs: L.CRS.Simple, minZoom: -2 });
    var bounds = [[0,0], [1000,1000]]; // Arbitrary coordinate grid
    L.imageOverlay(PLAN_IMAGE, bounds).addTo(map);
    map.fitBounds(bounds);

    // 3. INITIALIZE PANNELLUM (360 Viewer)
    var viewer = pannellum.viewer('panorama', {
        "type": "equirectangular",
        "panorama": "https://pannellum.org/images/alma.jpg", // Default placeholder
        "autoLoad": true
    });

    // 4. TAP TO CAPTURE LOGIC
    map.on('click', function(e) {
        if (!isCaptureMode) return;

        let name = prompt("Enter Pin Name (e.g. Room 101):");
        if (!name) return;

        let id = Date.now();
        updateStatus("Triggering Camera...");

        // A. TRIGGER CAMERA (RICOH/INSTA360 OSC API)
        // Note: This may throw a CORS error in browser, but the camera still receives the command.
        fetch('http://192.168.1.1/osc/commands/execute', {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ name: "camera.takePicture" })
        });

        // B. SAVE TO GOOGLE SHEET (VIA GAS)
        fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ action: "create", id: id, name: name, x: e.latlng.lng, y: e.latlng.lat })
        }).then(() => updateStatus("Saved: " + name));

        // C. ADD MARKER TO MAP
        addMarker(id, e.latlng, name);
    });

    function addMarker(id, latlng, name) {
        let m = L.marker(latlng, { draggable: true }).addTo(map);
        m.bindPopup("<b>" + name + "</b>");

        m.on('dragend', function() {
            let newPos = m.getLatLng();
            updateStatus("Updating Position...");
            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ action: "update", id: id, x: newPos.lng, y: newPos.lat })
            }).then(() => updateStatus("Position Updated"));
        });

        m.on('click', function() {
            // In a real project, we'd fetch the Drive photo link from the Sheet
            updateStatus("Viewing: " + name);
        });
    }

    function toggleMode() {
        isCaptureMode = !isCaptureMode;
        document.querySelector('.btn').innerText = isCaptureMode ? "MODE: CAPTURE" : "MODE: VIEW";
    }

    function updateStatus(msg) {
        document.getElementById('status').innerText = msg;
    }
</script>

</body>
</html>
