<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Site Walk - Multi Camera</title>
    <link rel="icon" type="image/png" href="./favicon.png" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        #app-container { display: flex; flex-direction: column; height: 100vh; }
        #map { flex: 1; background: #e5e5e5; position: relative; border-bottom: 4px solid #2c3e50; }
        #viewer-container { flex: 1; background: #000; }
        #panorama { width: 100%; height: 100%; }

        /* UI Overlays */
        .controls-top { position: absolute; top: 15px; right: 15px; z-index: 1000; display: flex; flex-direction: column; gap: 10px; }
        .floor-selector { position: absolute; top: 15px; left: 50px; z-index: 1000; background: white; padding: 10px; border-radius: 8px; border: 2px solid #2c3e50; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .btn { background: #2c3e50; color: white; padding: 12px 18px; border-radius: 6px; font-weight: bold; cursor: pointer; border: none; text-align: center; }
        .btn-secondary { background: #7f8c8d; }
        
        .status-bar { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.8); color: #2ecc71; padding: 6px 15px; border-radius: 20px; font-size: 13px; font-weight: bold; z-index: 1000; }
        
        select { padding: 8px; font-size: 16px; border-radius: 4px; border: 1px solid #ccc; width: 150px; }
        #loading { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: white; z-index: 9999; display: flex; justify-content: center; align-items: center; font-size: 20px; font-weight: bold; }
    </style>
</head>
<body>

<!-- Hidden File Input for Native Camera -->
<input type="file" accept="image/*" capture="environment" id="cameraInput" style="display:none;" onchange="process2DPhoto(event)">

<div id="loading">Loading Project Data from Google Sheets...</div>

<div id="app-container">
    <div id="map">
        <div class="floor-selector">
            <label style="display:block; font-size: 11px; font-weight: bold; margin-bottom: 4px;">PROJECT FLOOR</label>
            <select id="floorSelect" onchange="changeFloor()"></select>
        </div>

        <div class="controls-top">
            <button class="btn" style="background: #27ae60; margin-bottom: 5px;" onclick="activatePinDrop(event)">📍 ADD PIN</button>
            <button class="btn btn-secondary" onclick="syncPhotos()">BATCH SYNC (360)</button>
        </div>
        
        <div id="status" class="status-bar">System Connected</div>
    </div>

    <div id="viewer-container">
        <div id="panorama"></div>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const SCRIPT_URL = urlParams.get('api'); 
    
    let floors = [];
    let currentFloorIndex = 0;
    
    let planOverlay = null;
    let markers = [];
    let pendingPin = {}; // Stores location while 2D photo is taken
    let isAddingPin = false; // Tracks if the user clicked the Add Pin button
    
    // Disabled doubleClickZoom so it doesn't conflict with double-tap pinning
    var map = L.map('map', { crs: L.CRS.Simple, minZoom: -2, doubleClickZoom: false });

    if (!SCRIPT_URL) {
        document.getElementById('loading').innerText = "Error: Missing ?api= in URL";
    } else {
        fetch(SCRIPT_URL)
            .then(response => response.json())
            .then(data => { floors = data.floors; initializeApp(); })
            .catch(err => {
                document.getElementById('loading').innerText = "Failed to load project data. Check URL.";
                console.error(err);
            });
    }

    function initializeApp() {
        document.getElementById('loading').style.display = 'none';
        const select = document.getElementById('floorSelect');
        floors.forEach((f, i) => {
            let opt = document.createElement('option');
            opt.value = i;
            opt.innerText = f.name;
            select.appendChild(opt);
        });
        loadFloor(0);
    }

    // --- UPDATED LOAD FLOOR FUNCTION ---
    function loadFloor(index) {
        // 1. Remove old layers and markers
        if(planOverlay) map.removeLayer(planOverlay);
        markers.forEach(m => map.removeLayer(m));
        markers = [];
        currentFloorIndex = index;
        
        updateStatus("Loading drawing...");

        // 2. Create a temporary image to measure the actual dimensions
        let tempImg = new Image();
        
        tempImg.onload = function() {
            // Get the true pixel dimensions of the blueprint
            let imgHeight = this.height;
            let imgWidth = this.width;

            // Create dynamic bounds preserving the true aspect ratio
            let dynamicBounds = [[0, 0], [imgHeight, imgWidth]];

            // Draw the image on the map using the correct proportions
            planOverlay = L.imageOverlay(this.src, dynamicBounds).addTo(map);
            
            // Auto-zoom the map to perfectly frame the drawing
            map.fitBounds(dynamicBounds);
            
            updateStatus("Switched to " + floors[index].name);
        };

        tempImg.onerror = function() {
            updateStatus("Error: Could not load drawing image.");
        };

        // 3. Trigger the image load using the Google Drive URL
        tempImg.src = floors[index].url;
    }

    function changeFloor() {
        loadFloor(document.getElementById('floorSelect').value);
    }

    function activatePinDrop(event) {
        // Stop the click from falling through the button onto the map
        if (event) event.stopPropagation(); 
        
        // A tiny 50ms delay guarantees the map doesn't accidentally catch the tail-end of your button click
        setTimeout(() => {
            isAddingPin = true;
            document.getElementById('map').style.cursor = 'crosshair';
            updateStatus("Tap the map to drop a pin...");
        }, 50);
    }

    function createPinAt(latlng) {
        // Drop a temporary marker immediately so the user sees exactly where they tapped
        let tempMarker = L.marker(latlng).addTo(map);

        // A 300ms delay guarantees the browser draws the pin BEFORE the prompt freezes the screen
        setTimeout(() => {
            let name = prompt("Name this pin for " + floors[currentFloorIndex].name + ":");
            
            // If user hits cancel, remove the temp pin and stop
            if (!name) {
                map.removeLayer(tempMarker);
                return;
            }

            // Remove the temp pin, replace with permanent active pin
            map.removeLayer(tempMarker);

            let id = Date.now();

            // Save the layout pin to Sheets
            fetch(SCRIPT_URL, {
                method: 'POST', mode: 'no-cors',
                body: JSON.stringify({ action: "create", id: id, name: name, floor: floors[currentFloorIndex].name, x: latlng.lng, y: latlng.lat })
            }).then(() => updateStatus("Planned Pin: " + name));

            addMarker(id, latlng, name, "PLANNED");
        }, 300);
    }

    // MAIN TAP INTERACTION (Armed via button)
    map.on('click', function(e) {
        if (isAddingPin) {
            isAddingPin = false; // Disarm the pin dropper
            document.getElementById('map').style.cursor = ''; // Reset cursor
            createPinAt(e.latlng);
        }
    });

    // DOUBLE TAP / DOUBLE CLICK INTERACTION (Instant drop)
    map.on('dblclick', function(e) {
        isAddingPin = false; // Disarm single-click just in case it was active
        document.getElementById('map').style.cursor = '';
        createPinAt(e.latlng);
    });

    // HANDLE 2D CAMERA UPLOAD FROM EXISTING PIN
    function process2DPhoto(event) {
        const file = event.target.files[0];
        if (!file) return;

        updateStatus("Uploading 2D Photo to Drive...");
        
        const reader = new FileReader();
        reader.onload = function(e) {
            const base64Image = e.target.result;
            
            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({
                    action: "attach_2d",
                    id: pendingPin.id,
                    name: pendingPin.name,
                    floor: floors[currentFloorIndex].name,
                    image: base64Image,
                    mimeType: file.type
                })
            }).then(() => {
                updateStatus("2D Photo Saved & Attached!");
                document.getElementById('cameraInput').value = ""; // Reset input
            });
        };
        reader.readAsDataURL(file);
    }

    function addMarker(id, latlng, name, type) {
        let m = L.marker(latlng, { draggable: true }).addTo(map);
        m.id = id; // Store ID
        m.pinName = name; // Store Name for camera references
        
        let popupContent = `
            <div style="text-align:center; min-width: 130px;">
                <b style="font-size: 14px; display:block; margin-bottom:10px;">📍 ${name}</b>
                <button onclick="trigger360(${id})" style="background:#2c3e50; color:white; border:none; padding:8px; border-radius:4px; cursor:pointer; width:100%; margin-bottom:6px; font-weight:bold;">🌐 Snap 360</button>
                <button onclick="trigger2D(${id})" style="background:#8e44ad; color:white; border:none; padding:8px; border-radius:4px; cursor:pointer; width:100%; margin-bottom:6px; font-weight:bold;">📸 Take 2D</button>
                <button onclick="deletePin(${id})" style="background:#e74c3c; color:white; border:none; padding:8px; border-radius:4px; cursor:pointer; width:100%; font-weight:bold;">🗑️ Delete</button>
            </div>
        `;
        m.bindPopup(popupContent);
        markers.push(m);

        m.on('dragend', function() {
            let pos = m.getLatLng();
            fetch(SCRIPT_URL, {
                method: 'POST', mode: 'no-cors',
                body: JSON.stringify({ action: "update", id: id, x: pos.lng, y: pos.lat })
            });
            updateStatus("Position Updated");
        });
    }

    // NEW FUNCTION: DELETE PIN
    window.deletePin = function(id) {
        if (!confirm("Are you sure you want to delete this pin?")) return;
        
        // Remove from map visually
        let markerIndex = markers.findIndex(m => m.id === id);
        if (markerIndex > -1) {
            map.removeLayer(markers[markerIndex]);
            markers.splice(markerIndex, 1);
        }

        // Notify Google Sheets to delete row
        fetch(SCRIPT_URL, {
            method: 'POST', mode: 'no-cors',
            body: JSON.stringify({ action: "delete", id: id })
        });
        
        updateStatus("Pin Deleted");
    };

    window.trigger360 = function(id) {
        let marker = markers.find(m => m.id === id);
        if(!marker) return;
        
        updateStatus("Triggering 360 Camera...");
        fetch('http://192.168.1.1/osc/commands/execute', {
            method: 'POST', mode: 'no-cors',
            body: JSON.stringify({ name: "camera.takePicture" })
        });
        marker.closePopup();
    };

    window.trigger2D = function(id) {
        let marker = markers.find(m => m.id === id);
        if(!marker) return;
        
        pendingPin = { id: id, name: marker.pinName, latlng: marker.getLatLng() };
        document.getElementById('cameraInput').click();
        marker.closePopup();
    };

    function updateStatus(msg) {
        document.getElementById('status').innerText = msg;
        setTimeout(() => document.getElementById('status').innerText = "System Ready", 5000);
    }

    function syncPhotos() {
        alert("Ensure iPad Hotspot is ON and 360 Camera is connected to it.\nBatch sync will start now.");
    }
</script>

</body>
</html>
